<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>NeuroScope Prime | 3D Intelligence + Reporting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.11/dayjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
      (async () => {
        try {
          const [ReactModule, ReactDOMClientModule, htmModule] = await Promise.all([
            import("https://esm.sh/react@18.3.1"),
            import("https://esm.sh/react-dom@18.3.1/client"),
            import("https://esm.sh/htm@3.1.1"),
          ]);

          window.React = ReactModule.default || ReactModule;
          window.ReactDOM = ReactDOMClientModule;
          window.htm = htmModule.default || htmModule;
        } catch (error) {
          console.warn("Runtime module bootstrap failed", error);
        } finally {
          const appVersion = "20260416-workflow-demo-2";
          const appScript = document.createElement("script");
          appScript.src = `app.js?v=${appVersion}`;
          document.body.appendChild(appScript);
        }
      })();
    </script>
  </head>
  <body>
    <div class="prime-atmosphere" aria-hidden="true">
      <div class="prime-radial prime-radial-a"></div>
      <div class="prime-radial prime-radial-b"></div>
      <div class="prime-radial prime-radial-c"></div>
      <div class="prime-grid"></div>
    </div>
    <div id="root"></div>
  </body>
</html>
